kind = "web"
previewPath = "/"
title = "Pulse Watch"
version = "1.0.0"
id = "artifacts/pulse-watch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23561

[services.development]
run = "pnpm --filter @workspace/pulse-watch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulse-watch", "run", "build" ]
publicDir = "artifacts/pulse-watch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23561"
BASE_PATH = "/"
