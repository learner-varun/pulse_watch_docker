services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse_watch
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse_watch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Database migrations ─────────────────────────────────────────────────────
  # Runs drizzle-kit push once, then exits. The api service waits for it.
  db-migrate:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
      target: builder          # reuse the builder stage that has pnpm + drizzle-kit
    command: pnpm --filter @workspace/db run push
    environment:
      DATABASE_URL: postgres://pulse:pulse@db:5432/pulse_watch
    depends_on:
      db:
        condition: service_healthy

  # ── API server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://pulse:pulse@db:5432/pulse_watch
      # Override this in production with a strong random secret
      SESSION_SECRET: change-me-in-production
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: artifacts/pulse-watch/Dockerfile
    restart: unless-stopped
    ports:
      - "7007:7007"
    depends_on:
      - api

volumes:
  db_data:
